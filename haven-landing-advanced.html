<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HAVEN | Multi-Lingual Technical Overview</title>
  <style>
    :root {
      --accent: #22c55e;
      --blue: #61dafb;
      --bg1: #0f2027;
      --bg2: #2c5364;
      --card: #1a2a3a;
      --shadow: #22c55e44;
      --radius: 22px;
      --transition: 0.2s;
    }
    body {
      margin: 0;
      font-family: 'Cairo', Arial, sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2) 80%);
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .lang-switch {
      position: fixed;
      top: 18px;
      left: 24px;
      z-index: 100;
    }
    .lang-btn {
      background: var(--accent);
      color: #222;
      border: none;
      border-radius: 8px;
      padding: 0.4em 1.2em;
      font-size: 1em;
      font-weight: bold;
      margin-left: 0.5em;
      cursor: pointer;
      box-shadow: 0 2px 8px var(--shadow);
      transition: background var(--transition), color var(--transition);
    }
    .lang-btn.active {
      background: var(--blue);
      color: #222;
    }
    .topbar {
      width: 100%;
      background: rgba(20,30,40,0.98);
      box-shadow: 0 2px 12px #0005;
      padding: 0.7em 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar .logo {
      font-size: 1.7em;
      color: var(--accent);
      font-weight: bold;
      letter-spacing: 2px;
      margin-right: 2vw;
    }
    .container {
      max-width: 1200px;
      margin: 40px auto;
      background: rgba(20,30,40,0.97);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px #000a, 0 1.5px 0 var(--accent);
      padding: 48px 32px 32px 32px;
      position: relative;
    }
    h1 {
      font-size: 2.8rem;
      margin-bottom: 0.5em;
      letter-spacing: 2px;
      color: var(--accent);
      text-shadow: 0 2px 16px var(--shadow);
    }
    h2 {
      color: var(--blue);
      margin-top: 2.5em;
      font-size: 2rem;
    }
    .section {
      margin-bottom: 2.5em;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 32px;
      margin-top: 2em;
    }
    .card {
      background: linear-gradient(120deg, var(--card) 60%, var(--accent)22);
      border-radius: 18px;
      box-shadow: 0 2px 12px #0005;
      padding: 24px 18px;
      min-height: 180px;
      transition: transform var(--transition), box-shadow var(--transition);
      border: 1.5px solid var(--accent)33;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.7em;
    }
    .card .icon {
      font-size: 2.2em;
      margin-bottom: 0.2em;
      color: var(--blue);
      filter: drop-shadow(0 2px 8px var(--shadow));
    }
    .card pre {
      background: #222b;
      color: #fff;
      border-radius: 8px;
      padding: 0.7em 1em;
      font-size: 0.95em;
      margin: 0.5em 0 0 0;
      width: 100%;
      overflow-x: auto;
    }
    .card:hover {
      transform: translateY(-8px) scale(1.03) rotateY(4deg);
      box-shadow: 0 8px 32px var(--shadow), 0 2px 8px #0008;
    }
    .three-d {
      width: 100%;
      height: 320px;
      background: linear-gradient(120deg, var(--accent)33 60%, var(--blue)22);
      border-radius: 18px;
      margin-bottom: 2em;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px var(--accent)22;
      position: relative;
      overflow: hidden;
    }
    .three-d-cube {
      width: 120px;
      height: 120px;
      transform-style: preserve-3d;
      animation: rotateCube 6s infinite linear;
      position: relative;
    }
    .three-d-cube div {
      position: absolute;
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, var(--accent) 60%, var(--blue) 100%);
      opacity: 0.92;
      border: 2px solid #fff2;
      box-shadow: 0 2px 12px var(--shadow);
    }
    .three-d-cube .front  { transform: translateZ(60px); }
    .three-d-cube .back   { transform: rotateY(180deg) translateZ(60px); }
    .three-d-cube .right  { transform: rotateY(90deg) translateZ(60px); }
    .three-d-cube .left   { transform: rotateY(-90deg) translateZ(60px); }
    .three-d-cube .top    { transform: rotateX(90deg) translateZ(60px); }
    .three-d-cube .bottom { transform: rotateX(-90deg) translateZ(60px); }
    @keyframes rotateCube {
      0% { transform: rotateX(0) rotateY(0); }
      100% { transform: rotateX(360deg) rotateY(360deg); }
    }
    .footer {
      text-align: center;
      color: #fff8;
      margin-top: 3em;
      font-size: 1.1em;
    }
    @media (max-width: 700px) {
      .container { padding: 18px 4vw; }
      h1 { font-size: 2rem; }
      h2 { font-size: 1.2rem; }
    }
  </style>
  <script>
    // Multi-language content
    const content = {
      ar: {
        title: 'HAVEN — منصة سيادية للذكاء الاصطناعي والتطوير',
        about: 'HAVEN هو نظام تشغيل وبيئة تطوير سيادية متكاملة، مبنية على Debian ARM64 مع نواة مخصصة وأدوات ذكاء اصطناعي عربية أولاً. كل العمليات محلية 100%، بدون أي تتبع أو اتصال خارجي.',
        arch: 'مخطط معماري تقني',
        archDesc: 'المستخدم ⇄ HAVEN IDE ⇄ محرك Niyah ⇄ نظام التشغيل السيادي',
        cards: [
          { icon: '🖥️', title: 'نظام التشغيل', desc: 'Debian Bookworm ARM64، نواة 6.1 LTS، ملفات نظام غير قابلة للتغيير، تشفير كامل للقرص، دعم YubiKey.' },
          { icon: '💻', title: 'IDE سيادي', desc: 'React 19، TypeScript 5.8، Monaco Editor، xterm.js، isomorphic-git، Ollama للذكاء الاصطناعي المحلي.' },
          { icon: '🧠', title: 'محرك Niyah', desc: 'تحليل نية عربي، تصنيف لهجات ونبرة ومجال، توجيه ثلاثي الفصوص (معرفي، تنفيذي، حسي).' },
          { icon: '🛡️', title: 'أمن وطب شرعي', desc: '8 ماسحات أمنية حقيقية، كشف تسريبات، تدقيق بصمة، توليد أدلة رقمية.' }
        ],
        code: 'مثال كود: تحليل نية
let result = niyah.process("اكتب لي كود بايثون يطبع الأرقام من 1 إلى 10");',
        features: [
          'تحليل نية عربي دقيق (Morphological Root Analysis)',
          'تصنيف لهجات ونبرة ومجال تلقائي',
          'توجيه ثلاثي الفصوص (Cognitive, Executive, Sensory)',
          'تشفير كامل للقرص وملفات النظام',
          'تشغيل محلي 100% بدون أي تتبع',
          'تكامل مع YubiKey وdm-verity',
          'دعم كامل للمعايير الوطنية (PDPL، NCA-ECC)',
          'واجهة تفاعلية ثلاثية الأبعاد (3D)'
        ],
        footer: 'جميع الحقوق محفوظة — KHAWRIZM'
      },
      en: {
        title: 'HAVEN — Sovereign AI & Development Platform',
        about: 'HAVEN is a sovereign OS and IDE built on Debian ARM64 with a custom kernel and Arabic-first AI tools. All operations are 100% local, with zero tracking or external calls.',
        arch: 'Technical Architecture Diagram',
        archDesc: 'User ⇄ HAVEN IDE ⇄ Niyah Engine ⇄ Sovereign OS',
        cards: [
          { icon: '🖥️', title: 'Operating System', desc: 'Debian Bookworm ARM64, 6.1 LTS kernel, immutable root, full-disk encryption, YubiKey support.' },
          { icon: '💻', title: 'Sovereign IDE', desc: 'React 19, TypeScript 5.8, Monaco Editor, xterm.js, isomorphic-git, Ollama for local AI.' },
          { icon: '🧠', title: 'Niyah Engine', desc: 'Arabic intent analysis, dialect/tone/domain classification, three-lobe routing (Cognitive, Executive, Sensory).' },
          { icon: '🛡️', title: 'Security & Forensics', desc: '8 real security scanners, leak detection, fingerprint audit, digital evidence generation.' }
        ],
        code: 'Code Example: Intent Analysis\nlet result = niyah.process("Write Python code to print numbers 1 to 10");',
        features: [
          'Accurate Arabic intent analysis (Morphological Root Analysis)',
          'Automatic dialect, tone, and domain classification',
          'Three-lobe routing (Cognitive, Executive, Sensory)',
          'Full-disk and root encryption',
          '100% local operation, zero tracking',
          'YubiKey and dm-verity integration',
          'Full compliance with PDPL, NCA-ECC',
          'Interactive 3D UI'
        ],
        footer: 'All rights reserved — KHAWRIZM'
      }
    };
    let lang = 'ar';
    function setLang(l) {
      lang = l;
      document.documentElement.lang = l;
      document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
      const c = content[l];
      document.getElementById('title').textContent = c.title;
      document.getElementById('about').textContent = c.about;
      document.getElementById('arch-title').textContent = c.arch;
      document.getElementById('arch-desc').textContent = c.archDesc;
      document.getElementById('code').textContent = c.code;
      document.getElementById('footer').textContent = c.footer;
      // Cards
      const cards = document.getElementById('cards');
      cards.innerHTML = '';
      c.cards.forEach(card => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<span class="icon">${card.icon}</span><b>${card.title}</b><br>${card.desc}`;
        cards.appendChild(div);
      });
      // Features
      const features = document.getElementById('features');
      features.innerHTML = '';
      c.features.forEach(f => {
        const li = document.createElement('li');
        li.textContent = f;
        features.appendChild(li);
      });
    }
    window.onload = () => setLang(lang);
  </script>
</head>
<body>
  <div class="lang-switch">
    <button class="lang-btn active" onclick="setLang('ar')">العربية</button>
    <button class="lang-btn" onclick="setLang('en')">English</button>
  </div>
  <div class="topbar">
    <span class="logo">HAVEN</span>
  </div>
  <div class="container">
    <h1 id="title"></h1>
    <div class="three-d">
      <div class="three-d-cube">
        <div class="front"></div>
        <div class="back"></div>
        <div class="right"></div>
        <div class="left"></div>
        <div class="top"></div>
        <div class="bottom"></div>
      </div>
    </div>
    <div class="section">
      <h2 id="arch-title"></h2>
      <div style="margin-bottom:1em;color:#fff8" id="arch-desc"></div>
      <div class="grid" id="cards"></div>
    </div>
    <div class="section">
      <h2>Features / المميزات التقنية</h2>
      <ul id="features"></ul>
    </div>
    <div class="section">
      <h2>Code Example / مثال كود</h2>
      <div class="card"><pre id="code"></pre></div>
    </div>
    <div class="footer" id="footer"></div>
  </div>
</body>
</html>
