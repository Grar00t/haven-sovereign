<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#grad1)" rx="15" />
  <rect x="50" y="50" width="1100" height="300" fill="none" stroke="#00ff41" stroke-width="2" stroke-dasharray="10 5" opacity="0.3" rx="10" />
  <text x="600" y="200" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="80" fill="#00ff41" filter="url(#glow)" letter-spacing="8">HAVEN</text>
  <text x="600" y="260" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#ffffff" opacity="0.8" letter-spacing="4">THE SOVEREIGN ALGORITHM</text>
  <path d="M 550 320 L 600 350 L 650 320" fill="none" stroke="#00ff41" stroke-width="3" opacity="0.8" />
  <circle cx="600" cy="100" r="5" fill="#00ff41" opacity="0.8"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
</svg>